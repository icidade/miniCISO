name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate shell syntax
        run: bash -n scripts/*.sh
      - name: Install validation dependencies
        run: python3 -m pip install --disable-pip-version-check PyYAML==6.0.3
      - name: Validate repository
        run: bash scripts/validate-repo.sh

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $errors = $null
          Get-ChildItem scripts/*.ps1 | ForEach-Object {
            [void][Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errors)
            if ($errors) { $errors; exit 1 }
          }
      - name: Install validation dependencies
        run: python3 -m pip install --disable-pip-version-check PyYAML==6.0.3
      - name: Validate repository
        shell: pwsh
        run: ./scripts/validate-repo.ps1
